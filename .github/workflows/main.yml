name: Windows

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/**'

jobs:
  windows:
    name: Windows x64 Release
    runs-on: windows-latest

    env:
      UPLOAD_ARTIFACT: "true"
      ONLY_CACHE: "false"
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"
      
    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - uses: ilammy/msvc-dev-cmd@v1.13.0
        name: MSVC Environment
        with:
          arch: x64

      - name: Clone repository.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}\${{ env.REPO_NAME }}

      - name: Set environment.
        shell: bash
        run: |
          echo "CACHE_KEY=$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> $GITHUB_ENV
          git config --global user.email "you@example.com"
          git config --global user.name "builder"

      - name: NuGet setup.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: Cache ThirdParty.
        uses: actions/cache@v4
        with:
          path: ${{ env.TBUILD }}\ThirdParty
          key: ${{ runner.OS }}-x64-third-party-release-v1-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-third-party-release-v1-

      - name: Cache Libraries.
        uses: actions/cache@v4
        with:
          path: ${{ env.TBUILD }}\Libraries
          key: ${{ runner.OS }}-x64-libs-release-v1-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64-libs-release-v1-

      - name: Prepare Libraries.
        env:
          GYP_MSVS_OVERRIDE_PATH: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\'
          GYP_MSVS_VERSION: 2022
        run: |
          cd %TBUILD%
          %REPO_NAME%\Telegram\build\prepare\win.bat skip-debug silent

      - name: Set build config.
        shell: bash
        run: |
          echo "ARTIFACT_NAME=Telegram_x64_Release" >> $GITHUB_ENV
          echo "TDESKTOP_BUILD_API=-D TDESKTOP_API_TEST=ON" >> $GITHUB_ENV

      - name: Free disk space.
        run: |
          cd %TBUILD%
          del /S Libraries\*.pdb
          del /S Libraries\*.pch
          del /S Libraries\*.obj

      - name: Patch cmake
        shell: bash
        run: |
          cd "$TBUILD/$REPO_NAME/cmake"
          sed -i '/Bcrypt/a \    runtimeobject.lib\n\    windowsapp.lib' options_win.cmake

      - name: Build Telegram Desktop (Release)
        if: env.ONLY_CACHE == 'false'
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram
          call configure.bat ^
          %TDESKTOP_BUILD_GENERATOR% ^
          %TDESKTOP_BUILD_API% ^
          -D CMAKE_BUILD_TYPE=Release ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=OFF ^
          -D DESKTOP_APP_NO_PDB=ON
          cmake --build ..\out --config Release --parallel 2

      - name: Move artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          set OUT_DIR=%TBUILD%\%REPO_NAME%\out\Release
          mkdir artifact
          if exist "%OUT_DIR%\*.exe" (
              copy "%OUT_DIR%\*.exe" artifact\
          ) else (
              echo "Error: No executable found in %OUT_DIR%"
              exit 1
          )

      - name: Upload artifact.
        uses: actions/upload-artifact@v4
        with:
          name: Telegram_x64_Release
          path: artifact\
